apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: kruise-mutating-webhook-configuration
  annotations:
    template: ""
{{- if .Values.externalCerts.annotations }}
{{ toYaml .Values.externalCerts.annotations | indent 4 }}
{{- end }}
webhooks:
{{- if not (contains "PodWebhook=false" .Values.featureGates) }}
  - admissionReviewVersions:
      - v1
      - v1beta1
    clientConfig:
      service:
        name: kruise-webhook-service
        namespace: {{ .Values.installation.namespace }}
        path: /mutate-pod
    timeoutSeconds: {{ .Values.webhookConfiguration.timeoutSeconds }}
    failurePolicy: Fail
    name: mpod.kb.io
    namespaceSelector:
      matchExpressions:
        - key: control-plane
          operator: NotIn
          values:
            - openkruise
{{- if .Values.webhookConfiguration.aksIntegration }}
            - 'true'
        - key: kubernetes.azure.com/managedby
          operator: NotIn
          values:
            - aks
{{- end }}
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
    rules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
        resources:
          - pods
    sideEffects: None
{{- end }}
