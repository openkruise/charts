kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: checkpoints.agents.kruise.io
spec:
  group: agents.kruise.io
  names:
    kind: Checkpoint
    listKind: CheckpointList
    plural: checkpoints
    shortNames:
      - cp
    singular: checkpoint
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .status.phase
          name: Status
          type: string
