# Default values for agents-sandbox-controller.
# This is a YAML-formatted file.

sandboxController:
  replicaCount: 3

  image:
    repository: openkruise/agent-sandbox-controller
    pullPolicy: IfNotPresent
    tag: v0.1.0

  # Webhook configuration
  webhook:
    port: 9443

  # Metrics configuration
  metrics:
    port: 8443

  # Health probe configuration
  healthProbe:
    port: 8081

  resources:
    limits:
      cpu: "2"
      memory: 4Gi
    requests:
      cpu: "2"
      memory: 4Gi

# Namespace configuration
namespace:
  name: sandbox-system

# CRD configuration
crds:
  enabled: true

# ServiceAccount configuration
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# RBAC configuration
rbac:
  create: true

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

nodeSelector: {}

tolerations: []

affinity: {}
