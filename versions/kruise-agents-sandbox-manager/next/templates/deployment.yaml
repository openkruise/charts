apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sandbox-manager.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sandbox-manager.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sandbox-manager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "sandbox-manager.labels" . | nindent 8 }}
        {{- include "sandbox-manager.peerLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "sandbox-manager.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      hostNetwork: {{ .Values.controller.hostNetwork | default false }}
      dnsPolicy: Default
      containers:
        - name: controller
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.controller.repository }}:{{ .Values.controller.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.controller.pullPolicy }}
          command:
            - /sandbox-manager
          args:
            - -v={{ .Values.controller.logLevel }}
            - --zap-log-level={{ .Values.controller.logLevel }}
            - --system-namespace={{ .Release.Namespace }}
            - --peer-selector=agents.kruise.io/sandbox-manager-peer-finder={{ .Release.Name }}
            - --kube-client-qps=10000
            - --kube-client-burst=30000
            - --e2b-domain={{ .Values.e2b.domain }}
            - --e2b-admin-key={{ required "e2b.adminApiKey is required" .Values.e2b.adminApiKey }}
            - --e2b-enable-auth={{ .Values.e2b.enableAuth }}
            - --e2b-max-timeout={{ int .Values.e2b.maxTimeout }}
            - --max-claim-workers={{ int .Values.controller.maxClaimWorkers }}
            - --max-create-qps={{ int .Values.controller.maxCreateQPS }}
            - --ext-proc-max-concurrency={{ int .Values.controller.extProcMaxConcurrency }}
          ports:
            - containerPort: 8080
              name: http-manager
            - containerPort: 9002
              name: grpc-ext-proc
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 7789
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: 7789
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          env:
            - name: INFRA
              value: {{ .Values.controller.infra }}
          {{- with .Values.controller.resources }}
          resources:
            limits:
              {{- toYaml . | nindent 14 }}
            requests:
              {{- toYaml . | nindent 14 }}
          {{- end }}
        - name: envoy-proxy
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.proxy.repository }}:{{ .Values.proxy.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.proxy.pullPolicy }}
          args:
            - "--config-path /etc/envoy/envoy.yaml"
          livenessProbe:
            tcpSocket:
              port: 7788
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 7788
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: 7788
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          ports:
            - containerPort: 7788
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy/envoy.yaml
              subPath: envoy.yaml
      volumes:
        - name: envoy-config
          configMap:
            name: {{ include "sandbox-manager.fullname" . }}-envoy-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "sandbox-manager.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              control-plane: {{ include "sandbox-manager.name" . }}
{{- if and ( eq (int .Capabilities.KubeVersion.Major) 1) ( gt (int .Capabilities.KubeVersion.Minor) 26 ) }}
          matchLabelKeys:
            - pod-template-hash
{{- end }}
          maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}